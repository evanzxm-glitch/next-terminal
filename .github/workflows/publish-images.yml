name: Publish container images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v1.3.9-subpath*"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  next-terminal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/next-terminal:1.3.9-subpath
            ghcr.io/${{ github.repository_owner }}/next-terminal:${{ github.sha }}
          cache-from: type=gha,scope=next-terminal
          cache-to: type=gha,mode=max,scope=next-terminal

  guacd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: guacd/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/next-terminal-guacd:1.4.0
            ghcr.io/${{ github.repository_owner }}/next-terminal-guacd:${{ github.sha }}
          cache-from: type=gha,scope=guacd
          cache-to: type=gha,mode=max,scope=guacd
