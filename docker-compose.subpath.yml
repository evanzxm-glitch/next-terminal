services:
  guacd:
    image: ghcr.io/evanzxm-glitch/next-terminal-guacd:1.4.0
    build:
      context: .
      dockerfile: guacd/Dockerfile
    container_name: next-terminal-guacd
    restart: unless-stopped
    environment:
      GUACD_LOG_LEVEL: info
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - ${NEXT_TERMINAL_DATA_DIR:-./data}:/usr/local/next-terminal/data

  next-terminal:
    image: ghcr.io/evanzxm-glitch/next-terminal:1.3.9-subpath
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next-terminal-subpath
    restart: unless-stopped
    depends_on:
      guacd:
        condition: service_healthy
    environment:
      DB: sqlite
      SQLITE_FILE: /usr/local/next-terminal/data/sqlite/next-terminal.db
      SERVER_ADDR: 0.0.0.0:8080
      SSHD_ENABLE: "false"
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      GUACD_RECORDING: /usr/local/next-terminal/data/recording
      GUACD_DRIVE: /usr/local/next-terminal/data/drive
    ports:
      - "${NEXT_TERMINAL_PORT:-8080}:8080"
    volumes:
      - ${NEXT_TERMINAL_DATA_DIR:-./data}:/usr/local/next-terminal/data
